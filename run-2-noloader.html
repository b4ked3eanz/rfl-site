<!doctype html>
<meta charset="utf-8">
<title>run-2 — no loader</title>
<!-- Convenience entry point. Double-clicking run-2.html gives you no query string, and typing a
     Windows path with "?noloader" appended makes the browser treat the "?" as part of the
     filename. This redirects from inside the page, so the query is always applied properly. -->
<script>location.replace("run-2.html?noloader");</script>
<style>body{font:14px/1.5 system-ui,sans-serif;padding:2rem;color:#222}</style>
<p>Opening run-2 without the loader…
   <a href="run-2.html?noloader">click here</a> if it doesn't go automatically.</p>
