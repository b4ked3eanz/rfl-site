<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jelly Switch</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #1a1a1a; }
  #gl { position: fixed; inset: 0; display: block; width: 100%; height: 100%; }
  /* hover container — defines the interactive area over the track */
  #hit {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: min(60vw, 580px); height: min(13vw, 130px);
    border-radius: 100px; cursor: pointer; z-index: 2;
  }
  .hint {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); z-index: 3;
    font: 500 11px/1 ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
    letter-spacing: .16em; text-transform: uppercase; color: #5a5a5c;
    user-select: none; pointer-events: none; transition: opacity .5s ease;
  }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="hit"></div>
<div class="hint" id="hint">hover the switch</div>

<script type="x-shader/x-fragment" id="frag">#version 300 es
precision highp float;
out vec4 outColor;

uniform vec2  uRes;
uniform float uKnobX;    // knob position along the track
uniform vec2  uSquash;   // x,z stretch factors (volume-preserving)
uniform float uSquashY;  // y stretch factor
uniform float uLean;     // top-lag shear
uniform float uGlow;     // 0..1 activation
uniform float uTime;     // seconds (for the bioluminescent pulse)
uniform sampler2D uUnion; // cnvrt logo mask, embossed into the top surface

/* ---- scene constants (world units) ---- */
uniform float uSpan;                             // groove half-length (default 1.02; ?k= stretches for wide embeds)
#define GROOVE_A (-uSpan)
#define GROOVE_B (uSpan)
const float GROOVE_R = 0.09;                     // thin slot (short vertically)
const float GROOVE_DEPTH = 0.15;                 // a bit of height to the recess
const vec3  KNOB_B = vec3(0.32, 0.18, 0.32);     // keycap squircle half-extents
const float KNOB_R = 0.15;                       // knob corner radius
const float KNOB_CY = 0.07;                      // knob center height
const float KNOB_BOTTOM = -0.11, KNOB_FULLH = 0.40;
const vec3  LDIR = normalize(vec3(-0.14, 1.0, -0.34));  // near top-down; shadow falls "down" the screen
// blue bioluminescent palette (the colour lives in the LIGHT, not the body)
const vec3  BIO_DEEP = vec3(0.02, 0.18, 0.55);
const vec3  BIO_MID  = vec3(0.10, 0.48, 1.00);   // azure
const vec3  BIO_CORE = vec3(0.62, 0.86, 1.00);   // light blue-white
const float UNION_W = 0.36, UNION_H = 0.19;      // cnvrt logo size on the knob top (world units, 36:19 ~= spec)
const vec3  PAINT_COL = vec3(0.006);              // #1a1a1a — the logo is painted flat on the surface

float sdRoundBox(vec3 p, vec3 b, float r){
  vec3 q = abs(p) - b + r;
  return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0) - r;
}
float sdSeg(vec2 p, vec2 a, vec2 b){
  vec2 pa = p - a, ba = b - a;
  float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
  return length(pa - ba * h);
}
float sdEllipsoid(vec3 p, vec3 r){          // iq: rounded, domed everywhere (no flat faces)
  float k0 = length(p / r);
  float k1 = length(p / (r * r));
  return k0 * (k0 - 1.0) / k1;
}
float smin(float a, float b, float k){      // smooth union (soft blends, no hard creases)
  float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
  return mix(b, a, h) - k * h * (1.0 - h);
}
float smax(float a, float b, float k){ return -smin(-a, -b, k); }

float mapKnob(vec3 p){
  p.x -= uKnobX;
  float hh = clamp((p.y - KNOB_BOTTOM) / KNOB_FULLH, 0.0, 1.0);
  float w = hh * hh * (3.0 - 2.0 * hh);
  p.x -= uLean * w;                                  // top lags base
  p.x /= uSquash.x; p.z /= uSquash.y;                // stretch/squash
  p.y = (p.y - KNOB_CY) / uSquashY + KNOB_CY;
  vec3 q = p - vec3(0.0, KNOB_CY, 0.0);
  float box  = sdRoundBox(q, KNOB_B, KNOB_R);            // keycap squircle (defines the shape)
  float dome = sdEllipsoid(q, vec3(0.30, 0.22, 0.30));  // narrower + slightly taller -> gentle top curve ONLY
  float d = smin(box, dome, 0.08);
  return d * min(min(uSquash.x, uSquash.y), uSquashY);
}
float mapGround(vec3 p){
  float ground = p.y;                               // surface at y=0
  float chan = sdSeg(p.xz, vec2(GROOVE_A, 0.0), vec2(GROOVE_B, 0.0)) - GROOVE_R;
  float cutter = smax(chan, -(p.y + GROOVE_DEPTH), 0.03);   // pill trench cutter (defined, slight smoothing)
  return smax(ground, -cutter, 0.03);                       // subtract the trench — bevels stay defined
}
vec2 map(vec3 p){
  float g = mapGround(p);
  float k = mapKnob(p);
  return (k < g) ? vec2(k, 1.0) : vec2(g, 0.0);
}
vec3 calcNormal(vec3 p){
  vec2 e = vec2(0.0016, 0.0);
  return normalize(vec3(
    map(p + e.xyy).x - map(p - e.xyy).x,
    map(p + e.yxy).x - map(p - e.yxy).x,
    map(p + e.yyx).x - map(p - e.yyx).x));
}
float calcAO(vec3 p, vec3 n){
  float ao = 0.0, sca = 1.0;
  for (int i = 0; i < 5; i++){
    float h = 0.012 + 0.11 * float(i);
    ao += (h - map(p + n * h).x) * sca;
    sca *= 0.7;
  }
  return clamp(1.0 - 1.6 * ao, 0.0, 1.0);
}
float softShadow(vec3 ro, vec3 rd){
  float res = 1.0, t = 0.02;
  for (int i = 0; i < 24; i++){
    float h = map(ro + rd * t).x;
    if (h < 0.001) return 0.0;
    res = min(res, 11.0 * h / t);
    t += clamp(h, 0.012, 0.12);
    if (t > 5.0) break;
  }
  return clamp(res, 0.0, 1.0);
}
vec2 march(vec3 ro, vec3 rd, out float glowAcc){
  float t = 0.0, m = -1.0; glowAcc = 0.0;
  for (int i = 0; i < 96; i++){
    vec3 p = ro + rd * t;
    float dk = mapKnob(p);
    glowAcc += 0.02 / (1.0 + dk * dk * 210.0);    // tight halo bleed near the glowing jelly
    vec2 d = map(p);
    if (d.x < 0.001){ m = d.y; break; }
    t += d.x;
    if (t > 18.0) break;
  }
  return vec2(t, m);
}

// --- value noise + fbm (organic internal structure) ---
float hash(vec3 p){ p = fract(p * 0.3183099 + 0.1); p *= 17.0; return fract(p.x*p.y*p.z*(p.x+p.y+p.z)); }
float noise(vec3 x){
  vec3 i = floor(x), f = fract(x); f = f*f*(3.0-2.0*f);
  return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                 mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
             mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                 mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
}
float fbm(vec3 x){ float f=0.0, a=0.5; for(int i=0;i<3;i++){ f+=a*noise(x); x*=2.0; a*=0.5; } return f; }

// local thickness: 0 at the silhouette edge .. 1 in the dense core
float localThickness(vec3 p, vec3 N){
  const float maxD = 0.5; float t = 0.0;
  for (int i = 0; i < 9; i++){ float h = maxD*(float(i)+0.5)/9.0; t += clamp(-mapKnob(p - N*h)/maxD, 0.0, 1.0); }
  return clamp(t/9.0, 0.0, 1.0);
}
// material path length between the surface and the light (Beer-Lambert absorption)
float lightThick(vec3 p){
  float th = 0.0, t = 0.05;
  for (int i = 0; i < 5; i++){ th += max(0.0, -mapKnob(p - LDIR * t)); t += 0.08; }
  return th;
}

// cheap track/ground colour (no AO/shadow) — used as the REFRACTED background seen through the jelly
vec3 groundCheap(vec3 p){
  float chan = sdSeg(p.xz, vec2(GROOVE_A, 0.0), vec2(GROOVE_B, 0.0)) - GROOVE_R;   // <0 inside the slot
  vec3 surf  = vec3(0.014, 0.016, 0.020);                            // darker surface (outside)
  vec3 floorC = vec3(0.0046, 0.0046, 0.005);                         // slot floor ~#121212
  float inSlot = smoothstep(0.015, -0.02, chan);
  vec3 col = mix(surf, floorC * (0.7 + 0.3 * smoothstep(-GROOVE_R, 0.0, chan)), inSlot);
  col += vec3(0.24, 0.26, 0.30) * smoothstep(0.05, 0.0, abs(chan)) * (1.0 - inSlot * 0.5); // bright bevel rim -> the warp reads through the jelly
  col += BIO_MID * uGlow * 0.28 * inSlot;                            // refracted slot catches the glow subtly (through the slit)
  return col;
}

vec3 shadeGround(vec3 p, vec3 n){
  float ao = calcAO(p, n);
  // darker recessed surface — it sits UNDER the whole switch
  vec3 base = vec3(0.0044, 0.0044, 0.0047);                      // tracker surface ~#121212
  vec3 col = base;
  float depthT = smoothstep(0.0, -GROOVE_DEPTH, p.y);            // 0 at surface .. 1 at the floor
  col *= (1.0 - 0.22 * depthT);                                  // recess floor a touch darker, still ~#121212
  // inner vertical wall (the visible "height" slab) sits in shadow — low n.y = vertical face
  float wall = (1.0 - smoothstep(0.1, 0.5, n.y)) * smoothstep(0.1, 0.38, depthT);
  col *= 1.0 - 0.55 * wall;
  // the BOTTOM lip (wall curving back to the floor) catches a slight rim — NOT the top edge
  float lip = smoothstep(0.2, 0.55, n.y) * (1.0 - smoothstep(0.78, 1.0, n.y)) * smoothstep(0.5, 0.82, depthT);
  col += vec3(0.095, 0.10, 0.125) * lip;
  col *= 0.85 + 0.15 * ao;                                       // gentle recess occlusion
  // the surface catches the glow — long, gradual fade, 18% subtler
  float gd = length(p.xz - vec2(uKnobX, 0.0));
  col += BIO_MID * uGlow * smoothstep(1.6, 0.0, gd) * 0.59 * (1.0 - 0.5 * depthT);
  return col;
}

vec3 shadeJelly(vec3 entry, vec3 rd, vec3 n){
  vec3 V = -rd, L = LDIR;
  // --- the cnvrt logo is PAINTED flat (#1a1a1a) on the top surface (sampled here, applied after shading) ---
  float topFace = smoothstep(0.28, 0.72, n.y);
  float paintM = 0.0;
  vec2 luv = vec2((entry.x - uKnobX) / UNION_W, entry.z / UNION_H) + 0.5;
  if (topFace > 0.001 && luv.x > 0.0 && luv.x < 1.0 && luv.y > 0.0 && luv.y < 1.0){
    paintM = texture(uUnion, luv).r * topFace;
  }
  float density = localThickness(entry, n);
  float wrapD   = clamp((dot(n, L) + 0.6) / 1.6, 0.0, 1.0);
  float ao      = calcAO(entry, n);
  float fres    = pow(1.0 - clamp(dot(n, V), 0.0, 1.0), 3.0);

  // 1. REFRACTION — bend the ray through the jelly, sample the WARPED track behind it
  const float IOR = 1.6;
  vec3 kc = vec3(uKnobX, KNOB_CY, 0.0);
  vec3 rr = refract(rd, n, 1.0 / IOR);
  if (dot(rr, rr) < 1e-4) rr = rd;
  float t2 = 0.01;
  for (int i = 0; i < 44; i++){ float dk = mapKnob(entry + rr * t2); if (dk > 0.0) break; t2 += clamp(-dk, 0.006, 0.05); }
  vec3 exitP = entry + rr * t2;
  vec3 exitN = normalize(exitP - kc);                         // cheap far-side normal
  vec3 rr2 = refract(rr, -exitN, IOR);
  if (dot(rr2, rr2) < 1e-4) rr2 = rr;
  float tg = max(exitP.y, 0.0) / max(-rr2.y, 0.06);           // continue to the ground plane
  vec3 behind = groundCheap(exitP + rr2 * tg);
  vec3 sigma = -log(vec3(0.95, 0.96, 0.97));                  // very clear -> the refraction dominates
  vec3 interior = exp(-sigma * (t2 * 0.38));
  vec3 col = behind * interior;                               // the warped pill track shows through the clear body

  // 2. Whisper of frost — keeps a hint of jelly without hiding the warped track underneath
  float sss      = pow(density, 1.2);
  float topFrost = smoothstep(0.15, 0.85, n.y) * wrapD;
  vec3  keyCol   = mix(vec3(1.0, 1.0, 1.02), BIO_MID * 1.3, uGlow * 0.45);
  vec3  Hs       = normalize(L + n * 0.3);
  float back     = pow(clamp(dot(V, -Hs), 0.0, 1.0), 2.5) * 1.3 + 0.08;
  col = mix(col, col + keyCol * 0.5, topFrost * 0.02);        // minimal frost
  col += keyCol * back * (0.12 + 0.3 * sss) * (0.45 + 0.55 * ao) * 0.025; // whisper scatter
  float enter = pow(clamp(dot(n, L), 0.0, 1.0), 1.4);
  float depthGrad = smoothstep(-0.22, 0.24, (entry.y - KNOB_CY));
  col += keyCol * (enter * 0.04 + depthGrad * 0.025) * (0.4 + 0.6 * sss);

  // 3. Internal BLUE emission (uGlow-gated) — ADDED, so the refraction still reads when lit
  float fbmN  = fbm(entry * 4.0 + vec3(0.0, 0.0, uTime * 0.25));
  float pulse = 0.9 + 0.1 * sin(uTime * 1.6 + density * 3.0);
  // density^1.0 (was ^1.4): the exponent crushed everything but the thickest core to nearly
  // nothing, so the jelly read as dim glass with a spot in it rather than lit from within.
  float emit  = pow(density, 1.0) * pulse * (0.6 + 0.4 * fbmN);
  // Keep BIO_CORE (0.62,0.86,1.00 — nearly white) confined to the very densest core. Reaching it
  // early lightens the interior but DESATURATES it: it carries almost as much red as blue, so the
  // jelly goes pale-blue instead of reading as lit. The glow sells itself through saturation, not
  // brightness — so the bulk of the volume stays on BIO_MID (0.10,0.48,1.00), which puts ~10x more
  // energy into blue than red, and only the hottest filament blows out toward white.
  vec3  glowCol = mix(BIO_MID, BIO_CORE, smoothstep(0.55, 0.98, density));
  // accumulated separately from `col` so ambient occlusion cannot darken it (see below)
  // The lift goes mostly into the FLAT term (constant 0.55 raised, density weight lowered) rather
  // than the density-driven `emit`. Pushing `emit` is what produces a hot spot in the thick middle;
  // lifting the flat base raises the whole volume together, which is what reads as natural.
  vec3  inner = glowCol * emit * uGlow * 12.0
              + BIO_MID * uGlow * (0.55 + 0.55 * density) * 3.1;

  // 4. Fresnel rim — frost-white idle, blue when active (suppressed on the painted logo)
  vec3 rimCol = mix(vec3(0.82, 0.88, 1.0), BIO_MID, uGlow);
  col += rimCol * fres * (0.22 + 0.8 * uGlow) * (1.0 - paintM);

  // 5. Wet specular — NOT on the logo (the paint is matte)
  float ndh = clamp(dot(n, normalize(L + V)), 0.0, 1.0);
  col += vec3(1.0) * (pow(ndh, 20.0) * 0.26 + pow(ndh, 180.0) * 0.5) * (1.0 - paintM);
  col *= 0.5 + 0.5 * ao;                             // ambient occlusion — grounds the jelly, darkens the base
  // Emitted light is NOT occluded — it originates inside the volume. This used to be folded into
  // `col` before the AO multiply above, so the jelly's own glow was being darkened by up to half
  // exactly where the body is thickest, i.e. where it should be brightest. Added after instead.
  col += inner;

  // cnvrt logo PAINTED flat, matte, opaque (#1a1a1a) — applied last, over everything
  // the arrow is matte paint, but light still lands on it — a subtle blue lift, gated by uGlow
  //  so it only tints while the jelly is actually glowing (plus a hint of the key wrap for form)
  vec3 paintCol = PAINT_COL + BIO_MID * uGlow * (0.16 + 0.10 * wrapD);
  col = mix(col, paintCol, paintM);
  return col;
}

// render one sample (premultiplied rgba); called 4x for supersampled anti-aliasing
vec4 shadePixel(vec2 fc){
  vec2 uv = (fc * 2.0 - uRes) / uRes.y;
  vec3 target = vec3(0.0, -0.02, 0.0);
  vec3 camPos = vec3(0.0, 5.6, 1.75);
  vec3 fw = normalize(target - camPos);
  vec3 rt = normalize(cross(fw, vec3(0.0, 1.0, 0.0)));
  vec3 up = cross(rt, fw);
  float ortho = 2.5 / (uRes.x / uRes.y);           // switch fills ~44% width; rest is glow margin (transparent)
  vec3 ro = camPos + rt * uv.x * ortho + up * uv.y * ortho;
  vec3 rd = fw;

  float glowAcc;
  vec2 res = march(ro, rd, glowAcc);
  vec3 p = ro + rd * res.x;
  vec3 n = calcNormal(p);

  // opaque coverage: the knob + the pill track; everything else transparent
  vec3 opaqueLin; float coverage;
  if (res.y > 0.5){
    opaqueLin = shadeJelly(p, rd, n); coverage = 1.0;          // knob
  } else {
    float chan = sdSeg(p.xz, vec2(GROOVE_A, 0.0), vec2(GROOVE_B, 0.0)) - GROOVE_R;
    coverage = smoothstep(0.02, -0.02, chan);                  // 1 inside the pill track, soft edge
    opaqueLin = shadeGround(p, n);
  }
  vec3 opaqueCol = pow(opaqueLin / (1.0 + opaqueLin), vec3(0.4545));

  // glow (bloom halo + spill) — spread + elliptical (extends along the track); slightly less intense
  float dd = length(p.xz - vec2(uKnobX, 0.0));                 // circular, close to the knob
  // layered bloom — bright hot core -> mid -> soft outer (all pulled in tight)
  float core  = smoothstep(0.30, 0.0,  dd);
  float mid   = smoothstep(0.60, 0.04, dd);
  float outer = smoothstep(0.99, 0.10, dd);
  // Gentle overall lift. The core band is left almost alone and the gain is put into `mid`/`outer`
  // instead: raising the core is what makes a tight bright ring around the knob, whereas extending
  // the soft tail just makes the surface read as evenly lit.
  float glowAmt = glowAcc * uGlow * 2.7 + uGlow * (core * 1.8 + mid * 0.9 + outer * 0.4);
  float glowA = clamp(glowAmt * 0.92, 0.0, 1.0);
  vec3 glowLin = BIO_MID * 4.4 * glowAmt;                      // bright (hot core rolls to white via tonemap)
  vec3 glowCol = pow(glowLin / (1.0 + glowLin), vec3(0.4545));

  // premultiplied source-over: opaque switch OVER the glow
  float a = coverage + glowA * (1.0 - coverage);
  vec3 rgb = opaqueCol * coverage + glowCol * glowA * (1.0 - coverage);
  return vec4(rgb, a);
}

void main(){
  // 4x rotated-grid supersampling — smooths the jagged silhouette / logo / track edges
  vec4 c = shadePixel(gl_FragCoord.xy + vec2( 0.125,  0.375))
         + shadePixel(gl_FragCoord.xy + vec2( 0.375, -0.125))
         + shadePixel(gl_FragCoord.xy + vec2(-0.125, -0.375))
         + shadePixel(gl_FragCoord.xy + vec2(-0.375,  0.125));
  c *= 0.25;
  c.rgb += ((hash(vec3(gl_FragCoord.xy, 11.0)) - 0.5) / 255.0) * smoothstep(0.0, 0.04, c.a);
  outColor = c;
}
</script>

<script>
/* ============================================================
   TUNING
   ============================================================ */
const CFG = {
  leftX: -0.84, rightX: 0.84,        // knob travel — all the way to each end
  // travel position follows this exact easing curve
  travelDur: 0.52,                   // cubic-bezier(0.82, 0.03, 0, 0.98)
  // jelly deformation — bouncy squash/stretch/wobble (low damping => it bounces & settles)
  stretchF: 5.0, stretchZeta: 0.42, stretchCouple: 0.085, stretchMax: 0.26,
  leanF: 4.4, leanZeta: 0.42, leanCouple: 0.006, leanMax: 0.24,
  glowStart: 0.35, glowEnd: 0.9,
  fixedDt: 1 / 240,
};
const IS_DEBUG = new URLSearchParams(location.search).has('debug');
// ?k=1.43 stretches the groove + travel (knob size unchanged) — used by the footer embed to hit
// the design's 513px-track / 110px-knob ratio. Groove half-length and travel scale together.
const SPAN_K = parseFloat(new URLSearchParams(location.search).get('k')) || 1;
CFG.leftX *= SPAN_K; CFG.rightX *= SPAN_K;
// embedded hover: the parent page posts {t:'jelly',hover} so its own hit div can drive the switch
// (the iframe itself stays pointer-events:none and never blocks surrounding UI)
let visible = true;   // parent reports scroll visibility; default true so standalone still runs
window.addEventListener('message', (e) => {
  const d = e.data; if (!d || d.t !== 'jelly') return;
  // check for presence, not truthiness — a {vis} message carries no `hover` and must not clear it
  if ('hover' in d) hovering = !!d.hover;
  if ('vis'   in d) visible  = !!d.vis;
});
if (new URLSearchParams(location.search).has('embed')) {
  const h = document.getElementById('hint'); if (h) h.style.display = 'none';
  document.documentElement.style.background = 'transparent';
  document.body.style.background = 'transparent';   // asset is transparent; glow composites onto the footer
}

/* ---- GL setup ---- */
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl2', { antialias: false, preserveDrawingBuffer: true, alpha: true });
const VERT = `#version 300 es
precision highp float;
const vec2 P[3] = vec2[3](vec2(-1.,-1.), vec2(3.,-1.), vec2(-1.,3.));
void main(){ gl_Position = vec4(P[gl_VertexID], 0., 1.); }`;
function sh(type, src){ const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s)); return s; }
const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, document.getElementById('frag').textContent));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const U = {
  uRes: gl.getUniformLocation(prog, 'uRes'),
  uKnobX: gl.getUniformLocation(prog, 'uKnobX'),
  uSquash: gl.getUniformLocation(prog, 'uSquash'),
  uSquashY: gl.getUniformLocation(prog, 'uSquashY'),
  uLean: gl.getUniformLocation(prog, 'uLean'),
  uGlow: gl.getUniformLocation(prog, 'uGlow'),
  uTime: gl.getUniformLocation(prog, 'uTime'),
  uUnion: gl.getUniformLocation(prog, 'uUnion'),
  uSpan: gl.getUniformLocation(prog, 'uSpan'),
};

const unionTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, unionTex);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0, 0, 0, 255]));
let unionReady = false;
const unionImg = new Image();
unionImg.onload = () => {
  gl.bindTexture(gl.TEXTURE_2D, unionTex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, unionImg);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  unionReady = true;
};
unionImg.src = UNION_URI;
gl.uniform1i(U.uUnion, 0);
function resize(){
  const dpr = Math.min(devicePixelRatio || 1, IS_DEBUG ? 1 : 2);
  canvas.width = Math.round(innerWidth * dpr);
  canvas.height = Math.round(innerHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
}
addEventListener('resize', resize); resize();

/* ============================================================
   PHYSICS — smooth, critically damped
   ============================================================ */
function spring(f, z){ return { x: 0, v: 0, w: 2 * Math.PI * f, z }; }
function step(s, target, dt){
  const a = -s.w * s.w * (s.x - target) - 2 * s.z * s.w * s.v;
  s.v += a * dt; s.x += s.v * dt; return a;
}
// cubic-bezier easing (CSS-style), solved with Newton's method
function cubicBezier(x1, y1, x2, y2){
  const cx = 3 * x1, bx = 3 * (x2 - x1) - cx, ax = 1 - cx - bx;
  const cy = 3 * y1, by = 3 * (y2 - y1) - cy, ay = 1 - cy - by;
  const sx = t => ((ax * t + bx) * t + cx) * t;
  const sy = t => ((ay * t + by) * t + cy) * t;
  const dsx = t => (3 * ax * t + 2 * bx) * t + cx;
  return x => {
    let t = x;
    for (let i = 0; i < 8; i++){ const e = sx(t) - x; if (Math.abs(e) < 1e-5) break; const d = dsx(t); if (Math.abs(d) < 1e-6) break; t -= e / d; }
    return sy(Math.max(0, Math.min(1, t)));
  };
}
const ease = cubicBezier(0.82, 0.03, 0.0, 0.98);

const baseX = { x: CFG.leftX, v: 0 };
const travel = { from: CFG.leftX, to: CFG.leftX, t: 1 };
let prevV = 0;
const stretch = spring(CFG.stretchF, CFG.stretchZeta);
const lean = spring(CFG.leanF, CFG.leanZeta);
let hovering = false, lastHover = false;
let simT = 0;   // accumulated time (drives the pulse; deterministic under debug stepping)

function physics(dt){
  simT += dt;
  // travel: retarget on hover change, then follow the bezier curve over travelDur
  if (hovering !== lastHover){ travel.from = baseX.x; travel.to = hovering ? CFG.rightX : CFG.leftX; travel.t = 0; lastHover = hovering; }
  travel.t = Math.min(1, travel.t + dt / CFG.travelDur);
  const newX = travel.from + (travel.to - travel.from) * ease(travel.t);
  const vel = (newX - baseX.x) / Math.max(dt, 1e-6);
  const accel = (vel - prevV) / Math.max(dt, 1e-6);
  prevV = vel; baseX.v = vel; baseX.x = newX;
  // jelly deformation — stretch along motion (velocity), lean from acceleration; both bouncy
  const sT = Math.max(-CFG.stretchMax, Math.min(CFG.stretchMax, vel * CFG.stretchCouple));
  step(stretch, sT, dt);
  lean.v += -accel * CFG.leanCouple;
  step(lean, 0, dt);
  lean.x = Math.max(-CFG.leanMax, Math.min(CFG.leanMax, lean.x));
}

function apply(){
  const s = stretch.x;
  const sx = 1 + s, syz = 1 / Math.sqrt(1 + s);
  gl.uniform2f(U.uRes, canvas.width, canvas.height);
  gl.uniform1f(U.uKnobX, baseX.x);
  gl.uniform2f(U.uSquash, sx, syz);
  gl.uniform1f(U.uSquashY, syz);
  gl.uniform1f(U.uLean, lean.x);
  gl.uniform1f(U.uTime, simT);
  const p = (baseX.x - CFG.leftX) / (CFG.rightX - CFG.leftX);
  const g = Math.max(0, Math.min(1, (p - CFG.glowStart) / (CFG.glowEnd - CFG.glowStart)));
  gl.uniform1f(U.uGlow, g * g * (3 - 2 * g));
}
function render(){ apply(); gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, unionTex); gl.drawArrays(gl.TRIANGLES, 0, 3); }

/* ---- physics accumulator ---- */
let acc = 0;
function advance(dt){
  acc += Math.min(dt, 0.1);
  let n = 0;
  while (acc >= CFG.fixedDt && n < 400){ physics(CFG.fixedDt); acc -= CFG.fixedDt; n++; }
}

/* ============================================================
   HOVER CONTAINER + LOOP
   ============================================================ */
const hit = document.getElementById('hit');
const hint = document.getElementById('hint');
let hinted = false;
if (!IS_DEBUG){
  hit.addEventListener('pointerenter', () => { hovering = true; if (!hinted){ hint.style.opacity = '0'; hinted = true; } });
  hit.addEventListener('pointerleave', () => { hovering = false; });
}

if (IS_DEBUG){
  window.__jelly = {
    ready: false,
    setHover: (b) => { hovering = !!b; },
    // advance the FULL dt deterministically (no interactive frame-clamp)
    step: (dt) => { let a = dt; while (a >= CFG.fixedDt) { physics(CFG.fixedDt); a -= CFG.fixedDt; } render(); },
    state: () => ({ x: baseX.x, v: baseX.v, stretch: stretch.x, lean: lean.x }),
  };
  const tryReady = () => { if (!unionReady) { setTimeout(tryReady, 10); return; } advance(0.5); render(); window.__jelly.ready = true; };
  tryReady();
} else {
  /* Demand frameloop. This shader is expensive — per sample it walks a 96-step march, a 44-step
     refraction march, 5-sample AO, a 9-step thickness integral and 3-octave fbm, and every one of
     those runs 4x for the rotated-grid supersampling. Rays that MISS the switch pay the full step
     count, and most of an 828x440 frame is empty, so the idle cost is close to the worst case.
     It lives in the footer, which is offscreen for most of a session, so rendering unconditionally
     burned that on nothing. Now it only draws when the tab is visible AND the parent says the
     footer is on screen. rAF stays scheduled (it is free) so resuming needs no re-arming. */
  let last = performance.now();
  (function loop(now){
    requestAnimationFrame(loop);
    // reset the clock while parked, otherwise the first frame back gets a multi-second dt and the
    // spring integrator explodes across it
    if (!visible || document.hidden) { last = now; return; }
    advance((now - last) / 1000); last = now; render();
  })(performance.now());
}
